name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Check compiled integrity
        run: bash scripts/build-skills.sh --check

      - name: Build skills
        run: bash scripts/build-skills.sh

      - name: Lint - model-agnostic check
        run: bash scripts/lint-agnostic.sh agents/ skills/

      - name: Type check
        run: npx tsc --noEmit

      - name: Tests
        run: npx vitest run
